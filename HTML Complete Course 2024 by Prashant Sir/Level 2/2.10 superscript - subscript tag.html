<!-- Use ! (exclamation mark) to generate the HTML boilerplate using Emmet  -->
<!doctype html>
<html lang="en">
  <head>
    <!-- Page titile showen in browser tab -->
    <title>2.10 Superscript/Subscript | HTML Tags | Level 2</title>
  </head>
  <body>
    <!-- Add all visible contents here, just after opening body tag -->
    <p>(a + b)2 = a2 + b2 + 2ab</p>
    <p>(a + b)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + 2ab</p>
    <hr>
    <p>CH4 + O2 => H2O + CO2</p>
    <P>CH<sub>4</sub> + 2O<sub>2</sub> => 2H<sub>2</sub>O + CO<sub>2</sub></P>
  </body>
</html>
