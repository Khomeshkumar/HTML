<!-- Use ! (Exclamation mark) to generate the HTML boilerpalte using Emmet -->
<!doctype html>
<html lang="en">
  <head>
    <!-- The page head showen in browser tab -->
    <title>Level 2 | Must Use HTML Tags | 2.1 Heading Tags</title>
  </head>
  <body>
    <!-- Add all visible contents here, just after the body opening tag -->
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>
    <!-- Note: Heading tags are not used for font size. -->
    <!-- Used to give importance to headings. -->
    <!-- Always prefer CSS for font size and weight. -->
  </body>
</html>
