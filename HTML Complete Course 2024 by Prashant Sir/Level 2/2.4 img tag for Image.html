<!-- Use ! (exclamation mark) to generate the HTML boilerpate using Emmet -->
<!doctype html>
<html lang="en">
  <head>
    <!-- Page title is showen in browser tab -->
    <title>2.4 Image Tag | Level 2 | Must use HTML Tags</title>
  </head>
  <body>
    <!-- Add all visible contents here, just after the body opening tag -->
    <img
      src="images/user-profile.png"
      alt="This is an image of User Profile"
      height="250px"
    />
    <img
      src="images/user-profile.png"
      alt="This is an image of User Profile"
      width="200px"
    />
    <hr />
    <img
      src="images/user-profile.png"
      alt="This is an image of User Profile"
      width="200px"
      height="250px"
    />
    <!-- Try to fix height or width one attribute at a time  -->
    <!-- Otherwise image will look Shrinked/Stretched -->
  </body>
</html>
